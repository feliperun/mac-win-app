name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  powershell:
    name: PowerShell syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all .ps1 files
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -gt 0) {
              Write-Host "ERROR: $($_.FullName)" -ForegroundColor Red
              $parseErrors | ForEach-Object { Write-Host "  $($_.Message)" }
              $errors += $_.FullName
            } else {
              Write-Host "OK:    $($_.FullName)" -ForegroundColor Green
            }
          }
          if ($errors.Count -gt 0) { exit 1 }

  autohotkey:
    name: AutoHotkey syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoHotkey v2
        shell: pwsh
        run: |
          $url = "https://www.autohotkey.com/download/ahk-v2.zip"
          $zip = "$env:RUNNER_TEMP\ahk.zip"
          $dst = "$env:RUNNER_TEMP\ahk"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          $exe = Get-ChildItem -Recurse -Path $dst -Filter "AutoHotkey64.exe" | Select-Object -First 1
          if (-not $exe) { throw "AutoHotkey64.exe not found in zip" }
          "AHK_EXE=$($exe.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "AHK: $($exe.FullName)"
      - name: Validate .ahk files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.ahk | ForEach-Object {
            Write-Host "Validating $($_.FullName)"
            & $env:AHK_EXE /validate $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "AHK validation failed on $($_.FullName)" }
            Write-Host "  OK"
          }
